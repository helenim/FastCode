# Bandit config for CI and pre-commit (see .gitlab-ci.yml).
# Docs: https://bandit.readthedocs.io/en/latest/config.html
#
# Paths are matched against scanned file paths; leading "/" anchors to repo root.

exclude_dirs:
  - "/.venv"
  - "/venv"
  - "/.git"
  - "/node_modules"
  - "/nanobot/bridge/node_modules"
  - "/dist"
  - "/build"
  - "/.pytest_cache"
  - "/.ruff_cache"
