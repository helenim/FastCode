stages:
  - lint
  - test
  - type-check
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PYTHON_VERSION: "3.12"

default:
  image: python:${PYTHON_VERSION}-slim
  cache:
    key: "${CI_COMMIT_REF_SLUG}-pip"
    paths:
      - .pip-cache/

# ── Lint ──────────────────────────────────────────────────────────────

ruff:
  stage: lint
  allow_failure: false
  before_script:
    - pip install ruff
  script:
    # Full rules on first-party code; F/B/S only on vendored nanobot (full ruff on nanobot is ~4k+ style issues).
    - ruff check fastcode/ api.py mcp_server.py main.py web_app.py
    - ruff check nanobot/nanobot/ --select F,B,S
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

whatsapp-bridge:
  stage: lint
  image: node:20-bookworm-slim
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm-cache"
  cache:
    key: "${CI_COMMIT_REF_SLUG}-npm-bridge"
    paths:
      - .npm-cache/
  before_script:
    - cd nanobot/bridge && npm ci
  script:
    - cd nanobot/bridge && npm run build
    - cd nanobot/bridge && npm audit --audit-level=high
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Test ──────────────────────────────────────────────────────────────

pytest:
  stage: test
  allow_failure: false
  before_script:
    - pip install pytest pytest-asyncio pytest-cov -r requirements.txt
  script:
    # Coverage: include `fastcode` plus API/MCP entrypoints. Threshold ~15% line (branch-aware total);
    # raise gradually as tests grow. See [tool.coverage.report] in pyproject.toml.
    - >
      python -m pytest tests/ -v --tb=short
      --cov=fastcode --cov=api --cov=mcp_server
      --cov-report=term-missing
      --cov-fail-under=15
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

nanobot-pytest:
  stage: test
  allow_failure: false
  before_script:
    - pip install -e "./nanobot[dev]"
  script:
    - cd nanobot && python -m pytest tests/ -v --tb=short
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Type Check ───────────────────────────────────────────────────────

mypy:
  stage: type-check
  allow_failure: false
  before_script:
    - pip install mypy -r requirements.txt
  script:
    # pyproject.toml ignores errors inside `fastcode.*` until that package is fully typed.
    - mypy fastcode/ api.py mcp_server.py main.py web_app.py --ignore-missing-imports
    - mypy nanobot/nanobot/agent/tools/shell.py --ignore-missing-imports
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Security ─────────────────────────────────────────────────────────

security:
  stage: security
  allow_failure: false
  before_script:
    - pip install bandit pip-audit
  script:
    # Full nanobot tree adds many informational findings; gate the security-hardened exec tool explicitly.
    - bandit -c bandit.yaml -r fastcode/ api.py mcp_server.py main.py web_app.py nanobot/nanobot/agent/tools/shell.py -ll --format json -o bandit-report.json
    - pip-audit -r requirements.txt --strict --desc
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
