[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fastcode-ebridge"
version = "0.0.0"
description = "FastCode submodule (e-Bridge); metadata for tooling only — install via requirements.txt"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    # Shared workspace contracts (Keycloak auth for MCP server)
    "ebridge-shared[auth]",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "pytest-cov", "httpx"]

[tool.setuptools.packages.find]
include = ["fastcode*", "evaluation*"]

[tool.ruff]
extend = "../config/ruff-base.toml"
line-length = 88
target-version = "py311"
extend-exclude = ["nanobot", "vendor", ".agent"]

[tool.ruff.lint]
ignore = ["B904", "SIM102", "B008"]

[tool.coverage.run]
source = ["fastcode", "api", "mcp_server"]
branch = true

[tool.coverage.report]
fail_under = 15
omit = ["*/tests/*", "*/test_*.py"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
show_error_codes = true

# Ratchet: type-check public entrypoints first; remove ignores as `fastcode/` is cleaned up.
[[tool.mypy.overrides]]
module = ["fastcode", "fastcode.*"]
ignore_errors = true
