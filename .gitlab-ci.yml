stages:
  - lint
  - test
  - type-check
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PYTHON_VERSION: "3.12"

default:
  image: python:${PYTHON_VERSION}-slim
  cache:
    key: "${CI_COMMIT_REF_SLUG}-pip"
    paths:
      - .pip-cache/

# ── Lint ──────────────────────────────────────────────────────────────

ruff:
  stage: lint
  allow_failure: false
  before_script:
    - pip install ruff
  script:
    - ruff check fastcode/ api.py mcp_server.py main.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Test ──────────────────────────────────────────────────────────────

pytest:
  stage: test
  allow_failure: false
  before_script:
    - pip install pytest pytest-asyncio pytest-cov -r requirements.txt
  script:
    # Smoke tests mock `fastcode`; measure only modules they execute (api, mcp_server).
    # Align with [tool.coverage.report] fail_under in pyproject.toml.
    - >
      python -m pytest tests/ -v --tb=short
      --cov=api --cov=mcp_server
      --cov-report=term-missing
      --cov-fail-under=30
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Type Check ───────────────────────────────────────────────────────

mypy:
  stage: type-check
  allow_failure: false
  before_script:
    - pip install mypy -r requirements.txt
  script:
    - mypy fastcode/ api.py mcp_server.py main.py --ignore-missing-imports
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Security ─────────────────────────────────────────────────────────

security:
  stage: security
  allow_failure: false
  before_script:
    - pip install bandit pip-audit
  script:
    - bandit -r fastcode/ api.py mcp_server.py -ll --format json -o bandit-report.json
    - pip-audit -r requirements.txt --strict --desc
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
