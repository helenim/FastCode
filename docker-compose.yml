# FastCode + Nanobot Docker Compose
# 飞书 <-> Nanobot <-> FastCode 全链路通信
#
# Usage:
#   docker compose up          # 前台启动
#   docker compose up -d       # 后台启动
#   docker compose logs -f     # 查看日志
#   docker compose down        # 停止服务

services:
  fastcode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastcode
    ports:
      - "8001:8001"
    volumes:
      # Configuration — use env.example as a template; keep real .env out of git (see .gitignore).
      - ./.env:/app/.env:ro
      - ./config:/app/config:ro

      # Persistent data (indexes, cache, repos, logs)
      - ./data:/app/data
      - ./repos:/app/repos
      - ./logs:/app/logs

      # ebridge workspace root (read-only) — enables the workspace-aware
      # MCP tools (list_workspace_repos / query_all_repos /
      # cross_repo_blast_radius). Set EBRIDGE_WORKSPACE_HOST to the
      # absolute host path of the workspace; default mounts the parent
      # directory of this submodule (which is the workspace root in the
      # standard ebridge checkout layout).
      - ${EBRIDGE_WORKSPACE_HOST:-..}:/workspace:ro
    environment:
      - PYTHONUNBUFFERED=1
      - TOKENIZERS_PARALLELISM=false
      # Tells the workspace registry where to find the ebridge tree inside
      # the container. Must match the read-only volume mount above.
      - EBRIDGE_WORKSPACE_ROOT=/workspace
    restart: unless-stopped

  nanobot:
    build:
      context: ./nanobot
      dockerfile: Dockerfile
    container_name: fastcode-nanobot
    command: ["gateway"]
    ports:
      - "18791:18790"
    volumes:
      # Nanobot configuration (飞书/Telegram token 等) — must match non-root HOME in nanobot/Dockerfile (appuser)
      - ./nanobot_config.json:/home/appuser/.nanobot/config.json:ro

      # Persistent workspace data
      - nanobot-workspace:/home/appuser/.nanobot/workspace
      - nanobot-sessions:/home/appuser/.nanobot/sessions

      # Shared: nanobot can access FastCode repos
      - ./repos:/app/repos:ro
    environment:
      - NANOBOT_ENV=docker
      # Internal API URL for nanobot -> FastCode communication
      - FASTCODE_API_URL=http://fastcode:8001
    depends_on:
      - fastcode
    restart: unless-stopped

volumes:
  nanobot-workspace:
  nanobot-sessions:
