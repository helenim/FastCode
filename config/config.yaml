# FastCode 2.0 Configuration

# Repository Root Path (optional)
# Set this if you want to pre-configure the repository path for agency mode
# This will be overridden when loading a repository dynamically
repo_root: ./repos # safe repository path

# Repository Settings
repository:
  clone_depth: 1  # Shallow clone for faster processing
  max_file_size_mb: 5  # Skip files larger than this
  backup_directory: "./repo_backup"  # Backup replaced repos before overwrite
  ignore_patterns:
    - "*.pyc"
    - "__pycache__"
    - "node_modules"
    - ".git"
    - "*.min.js"
    - "*.bundle.js"
    - "dist/*"
    - "build/*"
    - "*.lock"
  supported_extensions:
    - .py
    - .js
    - .ts
    - .jsx
    - .tsx
    - .java
    - .go
    - .cpp
    - .c
    - .h
    - .rs
    - .rb
    - .php
    - .cs
    - .swift
    - .kt
    - .pyx
    - .toml
    - .md
    - .txt
    - .yaml
    - .rst
    - .json
    - .html
    - .css
    - .xml

# Parser Settings
parser:
  extract_docstrings: true
  extract_comments: true
  extract_imports: true
  compute_complexity: true
  max_function_lines: 3000  # Skip extremely long functions

# Embedding Settings
embedding:
  provider: "local"  # "local" (SentenceTransformer), "ollama", or "api"
  normalize_embeddings: true
  batch_size: 32
  # matryoshka_dim: 256  # Truncate embeddings to N dims (~4% quality loss, 8x smaller)
  # Supported values: 256, 512, 1024, or null (use full dimension)

  # Local provider (sentence-transformers, on-device)
  local:
    model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"  # Multilingual (470MB)
    # model: "sentence-transformers/all-MiniLM-L6-v2"  # English-only (90MB)
    device: "auto"  # "auto" (recommended), "cuda", "mps", or "cpu"
    max_seq_length: 512

  # Ollama provider (HTTP API, for nomic-embed-code / Qwen3-Embedding)
  ollama:
    base_url: "http://localhost:11434"  # or OLLAMA_BASE_URL env
    model: "nomic-embed-code"  # Code-specialized (recommended). Also: nomic-embed-text, Qwen3-Embedding
    truncate: true
    timeout: 120.0

  # API provider (OpenAI-compatible REST, for voyage-code-3 etc.)
  api:
    base_url: "https://api.voyageai.com/v1"  # or EMBEDDING_API_BASE_URL env
    model: "voyage-code-3"  # or EMBEDDING_API_MODEL env
    api_key_env: "EMBEDDING_API_KEY"  # env var name holding the API key
    timeout: 60.0
    # input_type: "document"  # optional, provider-specific

# Indexing Settings
indexing:
  # Multi-level indexing
  levels:
    - file  # File-level metadata
    - class  # Class definitions
    - function  # Function definitions
    - documentation  # Docs and comments

  # Include context
  include_imports: true
  include_class_context: true
  generate_repo_overview: true

# Vector Store Settings
vector_store:
  type: "faiss"  # "faiss" (default, no infra needed) or "qdrant" (production CRUD/filtering)
  distance_metric: "cosine"
  index_type: "HNSW"  # HNSW for fast approximate search
  ef_construction: 200
  ef_search: 50
  m: 16

  # Persistence (FAISS backend)
  persist_directory: "./data/vector_store"

  # Performance optimization (for web interface)
  index_scan_cache_ttl: 30  # Cache scan results for N seconds (0 to disable)
  index_scan_sample_size: 100  # Sample size for file count estimation

  # Qdrant backend settings
  qdrant:
    url: "http://localhost:6333"  # or QDRANT_URL env
    collection_name: "fastcode"
    overview_collection: "fastcode_overviews"
    on_disk: true
    hnsw_config:
      m: 16
      ef_construct: 200

# Retrieval Settings
retrieval:
  # Fusion method: "rrf" (Reciprocal Rank Fusion, recommended) or "weighted_linear"
  fusion_method: "rrf"
  rrf_k: 60  # RRF constant (standard value, no tuning needed)

  # Reranker: "type_weight" (default), "cross_encoder", or "none"
  reranker: "type_weight"
  # cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  rerank_top_n: 20

  # Hybrid search weights (used by weighted_linear fusion)
  semantic_weight: 0.5
  keyword_weight: 0.5
  graph_weight: 0.5

  # Filters
  min_similarity: 0.15
  max_results: 5
  diversity_penalty: 0.1  # Avoid returning too similar results

  # multi-repository retrieval
  enable_two_stage_retrieval: true
  select_repos_by_overview: true  # Select relevant repos based on overview before retrieval (works in both agency and normal mode)
  repo_selection_method: "llm"  # "llm" uses LLM to pick relevant repos from overviews; "embedding" uses semantic+BM25 scoring
  top_repos_to_search: 5
  min_repo_similarity: 0.1
  max_files_to_search: 15

  # Agency mode for accurate and comprehensive retrieval
  enable_agency_mode: true  # Enable agent-based retrieval


# Query Processing
query:
  # Basic processing
  expand_query: true  # Add synonyms and related terms
  decompose_complex: true  # Break down complex queries
  max_subqueries: 3
  extract_keywords: true
  detect_intent: true  # Detect query type (how/what/where/debug/implement)

  # LLM-Enhanced Processing
  use_llm_enhancement: true  # Enable LLM-based query understanding
  llm_enhancement_mode: "always"  # Options: "adaptive", "always", "off"
  # - adaptive: Use LLM only for complex/implementation queries (recommended)
  # - always: Use LLM for all queries (slower, more accurate)
  # - off: Disable LLM enhancement (faster, rule-based only)

  # Multi-turn dialogue settings
  history_summary_rounds: 10  # Number of previous round summaries to use for query rewriting
  max_summary_words: 500  # Maximum words for each round summary

# Answer Generation
# NOTE: model and base_url are read from environment variables (MODEL, BASE_URL)
generation:
  provider: "openai"  # openai, anthropic, or local
  temperature: 0.4
  max_tokens: 20000

  # Tiered model routing — use fast model for simple queries, strong model for complex
  routing:
    enabled: false                    # Set to true to enable tiered routing
    complexity_threshold: 40          # Queries with score < this use the fast model
    fast_model_env: "FAST_MODEL"      # Env var name for fast/cheap model
    strong_model_env: "MODEL"         # Env var name for strong model (default)

  # Context window management
  max_context_tokens: 200000
  reserve_tokens_for_response: 10000

  # Prompt settings
  include_file_paths: true
  include_line_numbers: true
  include_related_code: true

  # Multi-turn dialogue settings
  enable_multi_turn: true  # Enable multi-turn dialogue mode
  context_rounds: 10  # Number of previous rounds to include in context for answer generation

# Graph Building
graph:
  build_call_graph: true
  build_dependency_graph: true
  build_inheritance_graph: true
  build_tests_graph: true          # TESTS edges: test functions → tested targets
  build_co_change_graph: true      # FILE_CHANGES_WITH edges from git history
  build_type_usage_graph: true     # USES_TYPE edges from type annotations
  co_change_lookback: 100          # Number of commits to analyze for co-change
  co_change_min_commits: 3         # Minimum co-changes to create an edge
  community_detection: true        # Louvain community detection on combined graph
  blast_radius_hops: 2             # Max hops for impact analysis traversal
  max_depth: 5

# Agent Settings
agent:
  # Iterative Agent - Multi-round retrieval with confidence control
  iterative:
    max_iterations: 4  # Maximum number of retrieval rounds
    confidence_threshold: 95  # Stop iteration if confidence >= this value (0-100)
    min_confidence_gain: 5  # Minimum confidence gain required to continue (0-100)
    max_total_lines: 12000  # Maximum total lines of code to retrieve
    temperature_agent: 0.2  # Temperature for agent reasoning
    max_tokens_agent: 8000  # Max tokens for agent responses
    max_elements: 100  # Maximum elements to keep after relevance filtering
    max_candidates_display: 200  # Maximum candidates to display in formatting

# Caching
cache:
  enabled: true
  backend: "disk"  # disk or redis
  ttl: 3600  # seconds (1 hour) - for embeddings and general cache
  dialogue_ttl: 2592000  # seconds (30 days) - for dialogue history persistence
  max_size_mb: 1000
  cache_embeddings: true
  cache_queries: false
  cache_directory: "./data/cache"

  # Semantic query cache — matches similar queries by vector similarity
  semantic_cache:
    enabled: true
    similarity_threshold: 0.90  # Cosine threshold for cache hits (0.85-0.95)
    max_entries: 10000
    ttl: 3600  # seconds

# Evaluation Mode Settings
evaluation:
  enabled: false           # default off; enabled for benchmarks
  in_memory_index: false   # keep index purely in RAM
  disable_cache: false     # skip query/embedding cache
  disable_persistence: false  # skip writing FAISS/BM25/graph files
  force_reindex: false     # always rebuild instead of loading cached artifacts

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/fastcode.log"
  console: true
