# ─────────────────────────────────────────────────────────────────────────────
# Migrated to shared Python-service reusable workflow — 2026-04-20
# See: docs/planning/github-actions-reusable-workflows-prd-2026-04-20.md §4 (B1 pilot)
#
# Before: 72 lines inline (2 jobs: lint + test matrix).
# After : ~25 lines (reusable invocation + inputs).
#
# Behavior deltas from pre-migration:
#  1. Added a `security` job (bandit + pip-audit). Previously absent. Catches
#     supply-chain issues the pre-migration workflow didn't scan for.
#  2. MyPy skipped (mypy_path="") — matches pre-migration (fastcode didn't run mypy).
#  3. Multi-package coverage handled via pytest_extra_args — the single-package
#     shortcut (coverage_package) can't express --cov=api --cov=mcp_server.
#  4. Coverage gate stays at 50% (CLAUDE.md says "low — focus on integration
#     correctness over unit coverage"). Re-baseline when the tests catch up.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  ci:
    uses: helenim/2d-studio-ebridge-platform/.github/workflows/python-service.yml@main
    with:
      # Test matrix — same as pre-migration
      python_versions: '["3.11","3.12"]'
      # Lint scope — whole repo (pre-migration was `ruff check .`)
      package_path: "."
      # No type-check — pre-migration didn't run mypy
      mypy_path: ""
      # Multi-package coverage via escape hatch
      coverage_package: ""
      coverage_target: "50"
      pytest_extra_args: "--cov=api --cov=mcp_server"
      # Security — added by migration (was absent)
      run_security: true
      bandit_path: "fastcode api.py mcp_server.py main.py web_app.py"
